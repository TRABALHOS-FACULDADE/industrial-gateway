apiVersion: 1

datasources:
  - name: PostgreSQL_Industrial
    type: postgres
    url: db:5432
    database: industrial_db
    user: scada_user
    secureJsonData:
      password: scada_pass
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
