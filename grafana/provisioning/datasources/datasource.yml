apiVersion: 1

deleteDatasources:
  - name: PostgreSQL_Industrial
    orgId: 1

datasources:
  - name: PostgreSQL_Industrial
    uid: postgres-industrial
    type: postgres
    url: db:5432
    database: ${DB_NAME}
    user: ${DB_USER}
    secureJsonData:
      password: ${DB_PASSWORD}
    jsonData:
      database: ${DB_NAME}
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
